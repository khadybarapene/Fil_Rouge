apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  namespace: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-api
  template:
    metadata:
      labels:
        app: portfolio-api
    spec:
      containers:
      - name: api
        image: khady2026/portfolio-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: uri
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: portfolio-config
              key: PORT
