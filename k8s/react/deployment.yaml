apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-react
  namespace: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-react
  template:
    metadata:
      labels:
        app: portfolio-react
    spec:
      containers:
      - name: react
        image: khady2026/portfolio-react:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
