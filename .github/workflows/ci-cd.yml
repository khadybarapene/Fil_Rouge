name: CI/CD — Build & Push

on:
  push:
    branches: [main]

env:
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-api
  REACT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-react

jobs:
  build-push:
    name: Build & Push Docker images
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./portfolio-api
          push: true
          tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & push React
        uses: docker/build-push-action@v5
        with:
          context: ./portfolio-react
          push: true
          tags: ${{ env.REACT_IMAGE }}:latest,${{ env.REACT_IMAGE }}:${{ github.sha }}
